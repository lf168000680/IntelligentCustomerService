# AI 模型配置 (元数据模板)
# API Key 存储在数据库中，通过 GUI 管理
# 此文件仅定义模型元数据，首次启动时自动导入数据库
# 场景标签: default | reasoning | cheap | fast

providers:
  # ── Anthropic 原生 ──
  - name: "Claude Sonnet"
    provider: anthropic
    model_id: claude-sonnet-4-6
    temperature: 0.7
    max_tokens: 4096
    weight: 100
    enabled: true
    tags:
      - default

  - name: "Claude Haiku"
    provider: anthropic
    model_id: claude-haiku-4-5-20251001
    temperature: 0.5
    max_tokens: 2048
    weight: 100
    enabled: true
    tags:
      - fast
      - cheap

  - name: "Claude Opus (推理)"
    provider: anthropic
    model_id: claude-opus-4-8
    temperature: 0.3
    max_tokens: 8192
    weight: 100
    enabled: true
    tags:
      - reasoning

  # ── OpenAI 原生 ──
  - name: "GPT-4o"
    provider: openai
    model_id: gpt-4o
    temperature: 0.7
    max_tokens: 4096
    weight: 80
    enabled: true
    tags:
      - default

  - name: "GPT-4o-mini"
    provider: openai
    model_id: gpt-4o-mini
    temperature: 0.5
    max_tokens: 2048
    weight: 100
    enabled: true
    tags:
      - fast
      - cheap

  # ── OpenAI 兼容协议 ──
  - name: "DeepSeek V3"
    provider: openai_compat
    model_id: deepseek-chat
    api_base: https://api.deepseek.com/v1
    temperature: 0.5
    max_tokens: 4096
    weight: 100
    enabled: false
    tags:
      - cheap
      - default

  - name: "豆包 Lite (字节)"
    provider: openai_compat
    model_id: doubao-lite-32k
    api_base: https://ark.cn-beijing.volces.com/api/v3
    temperature: 0.5
    max_tokens: 4096
    weight: 100
    enabled: false
    tags:
      - cheap

  - name: "通义千问 Turbo"
    provider: openai_compat
    model_id: qwen-turbo
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
    temperature: 0.5
    max_tokens: 4096
    weight: 100
    enabled: false
    tags:
      - cheap

  - name: "GLM-4 Flash"
    provider: openai_compat
    model_id: glm-4-flash
    api_base: https://open.bigmodel.cn/api/paas/v4
    temperature: 0.5
    max_tokens: 4096
    weight: 100
    enabled: false
    tags:
      - cheap

  - name: "Groq Llama"
    provider: openai_compat
    model_id: llama-3.1-70b-versatile
    api_base: https://api.groq.com/openai/v1
    temperature: 0.5
    max_tokens: 4096
    weight: 100
    enabled: false
    tags:
      - cheap

  # ── API 中转站 / Relay (自定义 endpoint) ──
  # 以下为常见中转站预设，需在 GUI 中填写 API Key 和实际 endpoint
  - name: "OpenRouter"
    provider: openai_compat
    model_id: openai/gpt-4o
    api_base: https://openrouter.ai/api/v1
    temperature: 0.7
    max_tokens: 4096
    weight: 100
    enabled: false
    tags:
      - default
    headers:
      HTTP-Referer: "https://kefu.local"
      X-Title: "Kefu AI"

  - name: "自定义中转站"
    provider: openai_compat
    model_id: gpt-4o
    api_base: https://your-relay.example.com/v1
    temperature: 0.7
    max_tokens: 4096
    weight: 100
    enabled: false
    tags:
      - default
    headers: {}
    extra_config:
      timeout: 120

# 路由策略
routing:
  scene_tags:
    default: ["default", "cheap", "reasoning"]
    reasoning: ["reasoning", "default"]
    cheap: ["cheap", "fast", "default"]
    fast: ["fast", "cheap", "default"]
    quality: ["reasoning", "default"]

  fallback_order:
    - anthropic
    - openai
    - openai_compat

  max_retries: 3
  retry_delay_ms: 1000
