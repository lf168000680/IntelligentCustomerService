services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kefu-postgres
    environment:
      POSTGRES_DB: kefu
      POSTGRES_USER: kefu
      POSTGRES_PASSWORD: kefu_secret_change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kefu"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kefu-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: kefu-server
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: kefu
      POSTGRES_USER: kefu
      POSTGRES_PASSWORD: kefu_secret_change_me
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8800
    ports:
      - "8802:8800"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  gui:
    build:
      context: .
      dockerfile: gui/Dockerfile
    container_name: kefu-gui
    ports:
      - "8801:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
